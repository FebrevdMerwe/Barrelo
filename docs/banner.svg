<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Barrelo">
  <defs>
    <radialGradient id="baize" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#16402f"/>
      <stop offset="100%" stop-color="#0a2018"/>
    </radialGradient>
    <radialGradient id="boardShine" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#3a5a4c"/>
      <stop offset="100%" stop-color="#1c2e29"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#baize)"/>
  <rect x="1" y="1" width="1198" height="278" fill="none" stroke="#c89b3c" stroke-opacity="0.35" stroke-width="2"/>

  <!-- dartboard mark -->
  <g transform="translate(148,140)" filter="url(#soft)">
    <circle r="98" fill="url(#boardShine)" stroke="#7c5b28" stroke-width="3"/>
    <circle r="98" fill="none" stroke="#c89b3c" stroke-width="2" stroke-opacity="0.6"/>
    <g stroke="#EDE6D6" stroke-opacity="0.18" stroke-width="1.5">
      <line x1="-98" y1="0" x2="98" y2="0"/>
      <line x1="0" y1="-98" x2="0" y2="98"/>
      <line x1="-69" y1="-69" x2="69" y2="69"/>
      <line x1="-69" y1="69" x2="69" y2="-69"/>
      <line x1="-95" y1="-31" x2="95" y2="31"/>
      <line x1="-95" y1="31" x2="95" y2="-31"/>
      <line x1="-31" y1="-95" x2="31" y2="95"/>
      <line x1="31" y1="-95" x2="-31" y2="95"/>
    </g>
    <circle r="78" fill="none" stroke="#a5312a" stroke-width="10" stroke-opacity="0.85"/>
    <circle r="55" fill="none" stroke="#EDE6D6" stroke-width="9" stroke-opacity="0.9"/>
    <circle r="30" fill="none" stroke="#2e7d5b" stroke-width="9" stroke-opacity="0.9"/>
    <circle r="14" fill="#2e7d5b" stroke="#0a2018" stroke-width="2"/>
    <circle r="5" fill="#a5312a" stroke="#0a2018" stroke-width="1.5"/>
    <!-- dart -->
    <g transform="rotate(-32)">
      <line x1="-130" y1="0" x2="6" y2="0" stroke="#EDE6D6" stroke-width="3" stroke-linecap="round"/>
      <path d="M -130 0 L -112 -9 L -112 9 Z" fill="#c89b3c"/>
      <path d="M 6 0 L -14 -13 L -6 0 L -14 13 Z" fill="#a5312a"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(300,0)">
    <text x="0" y="132" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="88" fill="#EDE6D6" letter-spacing="1">Barrelo</text>
    <text x="4" y="172" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="22" fill="#a9b5ac" letter-spacing="0.5">a platform for interactive dart experiences</text>
    <rect x="4" y="190" width="640" height="2" fill="#7c5b28"/>
    <text x="4" y="222" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18" fill="#c89b3c" letter-spacing="0.5">detection ⟶ game logic ⟶ scoreboard, cleanly separated</text>
  </g>
</svg>
