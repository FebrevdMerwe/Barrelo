name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore Barrelo.slnx

      - run: dotnet build Barrelo.slnx -c Release --no-restore

      - run: dotnet test Barrelo.slnx -c Release --no-build
