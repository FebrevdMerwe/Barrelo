<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Barrelo — Live Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="scene" id="scene">

  <header class="rail">
    <div class="rail-left">
      <div class="wordmark">Barrelo<small>live scoreboard</small></div>
    </div>
    <div class="meta">
      <span class="game-pill" id="gameLabel">—</span>
      <span class="legmeta" id="legMeta">Leg 1 · Set 1</span>
    </div>
  </header>

  <div class="game-board-wrap">
    <div id="game-board">
      <p class="hero-sub" id="idleNotice">Waiting for a match to start&hellip;</p>
    </div>
  </div>

  <footer class="ledger">
    <span class="ledger-label">This leg, dart by dart</span>
    <div class="ledger-strip" id="ledgerStrip"></div>
  </footer>

</div>

<div class="win-banner" id="winBanner">
  <div class="win-card">
    <h2 id="winTitle">Game shot!</h2>
    <p id="winSub">Sam wins the match 3–0.</p>
    <div class="win-leaderboard" id="winLeaderboard" hidden>
      <h3 class="win-leaderboard-title">Session leaderboard</h3>
      <ol class="leaderboard-list" id="leaderboardList"></ol>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
<script src="view.js"></script>
</body>
</html>
