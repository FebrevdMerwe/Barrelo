<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oché — Start a match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="scene" id="scene">

  <header class="rail">
    <div class="rail-left">
      <div class="wordmark">Oché<small>start a match</small></div>
    </div>
    <div class="meta">
      <span class="legmeta">a platform for interactive dart experiences</span>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero-line">Step up to the oche.</h1>
    <p class="hero-sub">Add your players, pick a game, start throwing.</p>
  </section>

  <form class="setup-form" id="setupForm">

    <fieldset class="field-block">
      <legend class="section-label">Players</legend>
      <div class="player-grid" id="playerGrid">
        <p class="hero-sub" id="playerGridEmpty">Loading players&hellip;</p>
      </div>
      <div class="new-player-row">
        <input class="text-input" type="text" id="newPlayerInput" maxlength="20" placeholder="New player name">
        <button class="pull-btn" type="button" id="newPlayerBtn">Add player</button>
      </div>
    </fieldset>

    <fieldset class="field-block">
      <legend class="section-label">Game</legend>
      <div class="game-cards" id="gameCards">
        <p class="hero-sub" id="gameCardsEmpty">Loading games&hellip;</p>
      </div>
    </fieldset>

    <fieldset class="field-block" id="modeBlock" hidden>
      <legend class="section-label" id="modeLabel">Mode</legend>
      <div class="mode-options" id="modeOptions"></div>
    </fieldset>

    <fieldset class="field-block" id="groupsBlock">
      <legend class="section-label" id="groupsLabel">Groups</legend>
      <div class="group-columns" id="groupColumns"></div>
    </fieldset>

    <p class="hero-sub start-error" id="startError" hidden></p>
    <button class="pull-btn go start-cta" type="submit" id="startBtn">Start match</button>
  </form>

</div>

<script>
(function () {
  "use strict";

  var gameCardsEl = document.getElementById("gameCards");
  var gameCardsEmptyEl = document.getElementById("gameCardsEmpty");
  var form = document.getElementById("setupForm");
  var startBtn = document.getElementById("startBtn");
  var startErrorEl = document.getElementById("startError");

  var playerGridEl = document.getElementById("playerGrid");
  var playerGridEmptyEl = document.getElementById("playerGridEmpty");
  var newPlayerInput = document.getElementById("newPlayerInput");
  var newPlayerBtn = document.getElementById("newPlayerBtn");

  var modeBlock = document.getElementById("modeBlock");
  var modeLabel = document.getElementById("modeLabel");
  var modeOptionsEl = document.getElementById("modeOptions");

  var groupsLabel = document.getElementById("groupsLabel");
  var groupColumnsEl = document.getElementById("groupColumns");

  var existingPlayers = []; // [{id, name}], loaded from GET /api/players, alphabetical
  var roster = []; // [{id, name}], players toggled on for this match
  var gamesById = {}; // gameId -> full descriptor (incl. settings)

  // bucketOrder: bucketKey -> [playerId, ...] in throw order. Team games use "0".."N-1" plus
  // "spectator"; non-team games use "playing" plus "spectator". This is the single source of
  // truth for both group membership and per-group turn order (drag position = throw order).
  var bucketOrder = {};
  var roundRobinCursor = 0;

  function currentGame() {
    var checked = form.querySelector('input[name="game"]:checked');
    return checked ? gamesById[checked.value] : null;
  }

  function findSetting(game, kind) {
    if (!game || !game.settings) return null;
    for (var i = 0; i < game.settings.length; i++) {
      if (game.settings[i].kind === kind) return game.settings[i];
    }
    return null;
  }

  function renderGameCards(games) {
    gameCardsEl.innerHTML = "";
    gamesById = {};
    games.forEach(function (game) { gamesById[game.gameId] = game; });

    if (!games.length) {
      gameCardsEmptyEl.textContent = "No games available — is the API running with a plugin loaded?";
      gameCardsEl.appendChild(gameCardsEmptyEl);
      startBtn.disabled = true;
      return;
    }
    games.forEach(function (game, idx) {
      var label = document.createElement("label");
      label.className = "game-card";
      label.innerHTML =
        '<input type="radio" name="game" value="' + game.gameId + '"' + (idx === 0 ? " checked" : "") + '>' +
        '<span class="gc-visual">' +
          '<span class="gc-name">' + game.displayName + '</span>' +
          '<span class="gc-tagline">' + game.description + '</span>' +
        '</span>';
      gameCardsEl.appendChild(label);
    });
    gameCardsEl.querySelectorAll('input[name="game"]').forEach(function (input) {
      input.addEventListener("change", onGameChanged);
    });
    onGameChanged();
  }

  async function fetchGames() {
    try {
      var res = await fetch("/api/games");
      if (!res.ok) throw new Error("GET /api/games failed: " + res.status);
      renderGameCards(await res.json());
    } catch (err) {
      gameCardsEmptyEl.textContent = "Couldn't load games — is the API running?";
      console.error(err);
    }
  }

  // ---------- player identity (shared by the picker grid and the group chips) ----------

  function initials(name) {
    var parts = name.trim().split(/\s+/);
    return parts.slice(0, 2).map(function (p) { return p.charAt(0).toUpperCase(); }).join("");
  }

  function avatarColor(name) {
    var hash = 0;
    for (var i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    var hue = Math.abs(hash) % 360;
    return "hsl(" + hue + ", 38%, 30%)";
  }

  function playerById(id) {
    var fromRoster = roster.find(function (p) { return p.id === id; });
    if (fromRoster) return fromRoster;
    return existingPlayers.find(function (p) { return p.id === id; });
  }

  // ---------- player picker grid ----------

  async function fetchExistingPlayers() {
    try {
      var res = await fetch("/api/players");
      if (!res.ok) throw new Error("GET /api/players failed: " + res.status);
      existingPlayers = await res.json();
      renderPlayerGrid();
    } catch (err) {
      console.error(err);
      playerGridEl.innerHTML = "";
      playerGridEmptyEl.textContent = "Couldn't load players — is the API running?";
      playerGridEl.appendChild(playerGridEmptyEl);
    }
  }

  function renderPlayerGrid() {
    playerGridEl.innerHTML = "";
    if (!existingPlayers.length) {
      playerGridEmptyEl.textContent = "No players yet — add one below.";
      playerGridEl.appendChild(playerGridEmptyEl);
      return;
    }
    existingPlayers.forEach(function (player) {
      var selected = roster.some(function (p) { return p.id === player.id; });
      var card = document.createElement("button");
      card.type = "button";
      card.className = "player-card" + (selected ? " is-selected" : "");
      card.innerHTML =
        '<span class="chip-avatar" style="background:' + avatarColor(player.name) + '">' + initials(player.name) + '</span>' +
        '<span class="pc-name"></span>';
      card.querySelector(".pc-name").textContent = player.name;
      card.addEventListener("click", function () { toggleRosterPlayer(player); });
      playerGridEl.appendChild(card);
    });
  }

  function toggleRosterPlayer(player) {
    var idx = roster.findIndex(function (p) { return p.id === player.id; });
    if (idx === -1) {
      roster.push(player);
    } else {
      roster.splice(idx, 1);
      removePlayerFromBuckets(player.id);
    }
    renderPlayerGrid();
    renderGroupColumns();
  }

  async function createNewPlayer() {
    var name = newPlayerInput.value.trim();
    if (!name) return;
    var res = await fetch("/api/players", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name }),
    });
    if (!res.ok) throw new Error("POST /api/players failed: " + res.status);
    var player = await res.json();
    existingPlayers.push(player);
    existingPlayers.sort(function (a, b) { return a.name.localeCompare(b.name); });
    roster.push(player);
    newPlayerInput.value = "";
    renderPlayerGrid();
    renderGroupColumns();
  }

  newPlayerBtn.addEventListener("click", function () {
    createNewPlayer().catch(function (err) {
      console.error(err);
      alert("Couldn't add that player. See console for details.");
    });
  });
  newPlayerInput.addEventListener("keydown", function (e) {
    if (e.key !== "Enter") return;
    e.preventDefault();
    createNewPlayer().catch(function (err) {
      console.error(err);
      alert("Couldn't add that player. See console for details.");
    });
  });

  function renderModeOptions() {
    var game = currentGame();
    var setting = findSetting(game, "gameMode");
    if (!setting) {
      modeBlock.hidden = true;
      modeOptionsEl.innerHTML = "";
      return;
    }
    modeBlock.hidden = false;
    modeLabel.textContent = setting.displayName || "Mode";
    modeOptionsEl.innerHTML = "";
    setting.choices.forEach(function (choice, idx) {
      var isDefault = choice.value === setting.defaultValue || (!setting.defaultValue && idx === 0);
      var label = document.createElement("label");
      label.className = "source-pill-option";
      label.innerHTML =
        '<input type="radio" name="mode" value="' + choice.value + '"' + (isDefault ? " checked" : "") + '>' +
        '<span>' + choice.displayName + '</span>';
      modeOptionsEl.appendChild(label);
    });
  }

  // ---------- groups (drag-and-drop buckets, including a Spectator bench) ----------

  // Team games (declare a playerGroup setting) get one bucket per declared team plus Spectator.
  // Every other game gets a single uncapped "Playing" bucket plus Spectator, so a big roster can
  // still be manually benched even when the game itself has no team concept.
  function bucketSpec(game) {
    var setting = findSetting(game, "playerGroup");
    if (setting) return { hasTeams: true, teamCount: setting.maxGroups, maxPerTeam: setting.maxPlayersPerGroup };
    return { hasTeams: false, teamCount: 1, maxPerTeam: null };
  }

  function bucketKeys(spec) {
    var keys = spec.hasTeams
      ? Array.from({ length: spec.teamCount }, function (_, g) { return String(g); })
      : ["playing"];
    keys.push("spectator");
    return keys;
  }

  function bucketLabel(spec, key) {
    if (key === "spectator") return "Spectator";
    return spec.hasTeams ? "Team " + String.fromCharCode(65 + Number(key)) : "Playing";
  }

  function bucketCap(spec, key) {
    return (spec.hasTeams && key !== "spectator") ? spec.maxPerTeam : null;
  }

  function removePlayerFromBuckets(playerId) {
    Object.keys(bucketOrder).forEach(function (key) {
      var idx = bucketOrder[key].indexOf(playerId);
      if (idx !== -1) bucketOrder[key].splice(idx, 1);
    });
  }

  // Rebuilds bucketOrder for the current game's spec: carries over players who are still in the
  // roster (remapping to Spectator if their old bucket no longer exists), bumps anyone now over a
  // team's capacity into Spectator, then default-places any roster player with no bucket yet.
  function reconcileBuckets(spec) {
    var keys = bucketKeys(spec);
    var oldOrder = bucketOrder;
    bucketOrder = {};
    keys.forEach(function (k) { bucketOrder[k] = []; });

    var rosterIds = roster.map(function (p) { return p.id; });
    Object.keys(oldOrder).forEach(function (oldKey) {
      oldOrder[oldKey].forEach(function (playerId) {
        if (rosterIds.indexOf(playerId) === -1) return;
        var targetKey = keys.indexOf(oldKey) !== -1 ? oldKey : "spectator";
        bucketOrder[targetKey].push(playerId);
      });
    });

    if (spec.hasTeams) {
      keys.filter(function (k) { return k !== "spectator"; }).forEach(function (key) {
        while (bucketOrder[key].length > spec.maxPerTeam) {
          bucketOrder.spectator.push(bucketOrder[key].pop());
        }
      });
    }

    var placedIds = [].concat.apply([], Object.keys(bucketOrder).map(function (k) { return bucketOrder[k]; }));
    roster.forEach(function (player) {
      if (placedIds.indexOf(player.id) !== -1) return;
      if (!spec.hasTeams) { bucketOrder.playing.push(player.id); return; }

      var teamKeys = keys.filter(function (k) { return k !== "spectator"; });
      var placed = false;
      for (var attempt = 0; attempt < teamKeys.length; attempt++) {
        var key = teamKeys[roundRobinCursor % teamKeys.length];
        roundRobinCursor++;
        if (bucketOrder[key].length < spec.maxPerTeam) {
          bucketOrder[key].push(player.id);
          placed = true;
          break;
        }
      }
      if (!placed) bucketOrder.spectator.push(player.id);
    });
  }

  function renderChip(player) {
    var chip = document.createElement("div");
    chip.className = "player-chip";
    chip.dataset.playerId = player.id;
    chip.innerHTML =
      '<span class="chip-avatar" style="background:' + avatarColor(player.name) + '">' + initials(player.name) + '</span>' +
      '<span class="chip-name"></span>';
    chip.querySelector(".chip-name").textContent = player.name;
    chip.addEventListener("pointerdown", onChipPointerDown);
    return chip;
  }

  function renderGroupColumns() {
    var game = currentGame();
    var spec = bucketSpec(game);
    reconcileBuckets(spec);

    var groupSetting = findSetting(game, "playerGroup");
    groupsLabel.textContent = groupSetting ? (groupSetting.displayName || "Teams") : "Groups";
    groupColumnsEl.innerHTML = "";

    if (!roster.length) {
      var empty = document.createElement("p");
      empty.className = "hero-sub";
      empty.textContent = "Add players above, then drag them into teams.";
      groupColumnsEl.appendChild(empty);
      return;
    }

    bucketKeys(spec).forEach(function (key) {
      var col = document.createElement("div");
      col.className = "group-bucket" + (key === "spectator" ? " is-spectator" : "");
      col.dataset.bucketKey = key;

      var cap = bucketCap(spec, key);
      var header = document.createElement("div");
      header.className = "bucket-header";
      header.innerHTML = "<span>" + bucketLabel(spec, key) + "</span>" +
        (cap ? '<span class="bucket-count">' + bucketOrder[key].length + "/" + cap + "</span>" : "");
      col.appendChild(header);

      var body = document.createElement("div");
      body.className = "bucket-body";
      body.dataset.bucketKey = key;
      bucketOrder[key].forEach(function (playerId) {
        var player = playerById(playerId);
        if (player) body.appendChild(renderChip(player));
      });
      col.appendChild(body);
      groupColumnsEl.appendChild(col);
    });
  }

  // ---------- drag-and-drop (pointer events so this works on touch, not just mouse) ----------

  var drag = null; // { playerId, sourceKey, ghost, placeholder }

  function onChipPointerDown(e) {
    if (e.button !== undefined && e.button !== 0) return;
    var chip = e.currentTarget;
    var body = chip.closest(".bucket-body");
    var rect = chip.getBoundingClientRect();

    var ghost = chip.cloneNode(true);
    ghost.className = "player-chip chip-ghost";
    ghost.style.width = rect.width + "px";
    document.body.appendChild(ghost);
    positionGhost(ghost, rect.left, rect.top);

    var placeholder = document.createElement("div");
    placeholder.className = "chip-placeholder";
    placeholder.style.height = rect.height + "px";
    chip.parentNode.insertBefore(placeholder, chip);

    drag = {
      playerId: chip.dataset.playerId,
      sourceKey: body.dataset.bucketKey,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      ghost: ghost,
      placeholder: placeholder,
    };
    chip.classList.add("chip-dragging-source");
    chip.remove();

    document.addEventListener("pointermove", onChipPointerMove);
    document.addEventListener("pointerup", onChipPointerUp);
  }

  function positionGhost(ghost, x, y) {
    ghost.style.left = x + "px";
    ghost.style.top = y + "px";
  }

  function onChipPointerMove(e) {
    if (!drag) return;
    positionGhost(drag.ghost, e.clientX - drag.offsetX, e.clientY - drag.offsetY);

    drag.ghost.style.visibility = "hidden";
    var target = document.elementFromPoint(e.clientX, e.clientY);
    drag.ghost.style.visibility = "";
    var body = target ? target.closest(".bucket-body") : null;
    if (!body) return;

    var siblings = Array.prototype.filter.call(body.children, function (el) { return el !== drag.placeholder; });
    var before = siblings.find(function (el) {
      var r = el.getBoundingClientRect();
      return e.clientY < r.top + r.height / 2;
    });
    if (before) {
      body.insertBefore(drag.placeholder, before);
    } else {
      body.appendChild(drag.placeholder);
    }
  }

  function onChipPointerUp() {
    if (!drag) return;
    document.removeEventListener("pointermove", onChipPointerMove);
    document.removeEventListener("pointerup", onChipPointerUp);

    var targetBody = drag.placeholder.parentNode;
    var targetKey = targetBody.dataset.bucketKey;
    var targetIndex = Array.prototype.indexOf.call(targetBody.children, drag.placeholder);

    removePlayerFromBuckets(drag.playerId);
    bucketOrder[targetKey].splice(targetIndex, 0, drag.playerId);

    var game = currentGame();
    var spec = bucketSpec(game);
    if (spec.hasTeams && targetKey !== "spectator" && bucketOrder[targetKey].length > spec.maxPerTeam) {
      // dropping into a full team bumps whoever's now last in that team out to Spectator
      var bumped = bucketOrder[targetKey].pop();
      bucketOrder.spectator.push(bumped);
    }

    drag.ghost.remove();
    drag.placeholder.remove();
    drag = null;
    renderGroupColumns();
  }

  function onGameChanged() {
    renderModeOptions();
    renderGroupColumns();
  }

  function validate() {
    var spectatorCount = bucketOrder.spectator ? bucketOrder.spectator.length : 0;
    var playingCount = roster.length - spectatorCount;
    if (playingCount < 2) return "Add at least two players who aren't spectating.";
    return null;
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    var validationError = validate();
    if (validationError) {
      startErrorEl.textContent = validationError;
      startErrorEl.hidden = false;
      return;
    }
    startErrorEl.hidden = true;

    startBtn.disabled = true;
    startBtn.textContent = "Starting…";

    try {
      var game = currentGame();

      var options = {};
      var modeSetting = findSetting(game, "gameMode");
      if (modeSetting) {
        var selectedMode = form.querySelector('input[name="mode"]:checked');
        var choice = modeSetting.choices.find(function (c) { return c.value === (selectedMode && selectedMode.value); });
        if (choice) Object.assign(options, choice.options);
      }

      var spec = bucketSpec(game);
      var teamKeys = bucketKeys(spec).filter(function (k) { return k !== "spectator"; });

      var playerIds = [];
      var playerGroups = null;
      if (spec.hasTeams) {
        playerGroups = {};
        var maxLen = teamKeys.reduce(function (max, key) { return Math.max(max, bucketOrder[key].length); }, 0);
        for (var i = 0; i < maxLen; i++) {
          teamKeys.forEach(function (key) {
            var id = bucketOrder[key][i];
            if (id) {
              playerIds.push(id);
              playerGroups[id] = Number(key);
            }
          });
        }
      } else {
        playerIds = bucketOrder.playing.slice();
      }

      var matchRes = await fetch("/api/matches", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          gameId: game.gameId,
          playerIds: playerIds,
          options: options,
          playerGroups: playerGroups,
        }),
      });
      if (!matchRes.ok) {
        var problem = await matchRes.json().catch(function () { return null; });
        var message = (problem && (problem.title || problem.detail)) || ("POST /api/matches failed: " + matchRes.status);
        startErrorEl.textContent = message;
        startErrorEl.hidden = false;
        startBtn.disabled = false;
        startBtn.textContent = "Start match";
        return;
      }
      var started = await matchRes.json();

      window.location.href = "match.html?matchId=" + encodeURIComponent(started.matchId);
    } catch (err) {
      console.error(err);
      alert("Couldn't start the match — is the API running? See console for details.");
      startBtn.disabled = false;
      startBtn.textContent = "Start match";
    }
  });

  fetchExistingPlayers();
  fetchGames();
  document.getElementById("scene").classList.add("is-ready");
})();
</script>
</body>
</html>
