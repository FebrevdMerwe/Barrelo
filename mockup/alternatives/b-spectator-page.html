<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oché — Alt B: Spectator view</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../plugins/x01/style.css">
<link rel="stylesheet" href="alt.css">
</head>
<body class="alt-body">
<div class="scene is-ready" style="min-height:auto;">

  <div class="concept-nav">
    <a class="crumb" href="index.html">&lsaquo; All alternatives</a>
    <span class="game-pill">Alt B — Spectator / TV</span>
    <a class="cross-link" href="b-scorer-page.html">Open scorer view →</a>
  </div>

  <p class="state-frame-note">Cast on a TV or second screen. Read-only — no board, no controls, nothing to accidentally tap. Just the game, huge.</p>

  <div class="spectator-shell">
    <div class="spectator-header">
      <div class="wordmark">Oché<small>live</small></div>
      <span class="legmeta">Leg 2 · Set 1</span>
    </div>

    <div class="spectator-x01">
      <div class="x01-panel active">
        <div class="x01-name">Febre</div>
        <div class="x01-remaining">241</div>
        <div class="tallies">
          <span class="tally-group">legs<span class="tally-marks"><span class="chalk-tick"></span></span></span>
          <span class="tally-group">sets<span class="tally-marks"></span></span>
        </div>
      </div>
      <div class="x01-panel">
        <div class="x01-name">Sam</div>
        <div class="x01-remaining">402</div>
        <div class="tallies">
          <span class="tally-group">legs<span class="tally-marks"></span></span>
          <span class="tally-group">sets<span class="tally-marks"></span></span>
        </div>
      </div>
    </div>

    <footer class="ledger" style="width:min(720px, 92vw);">
      <span class="ledger-label">This leg, dart by dart</span>
      <div class="ledger-strip">
        <span class="chip">T20</span><span class="chip">T20</span><span class="chip">20</span>
        <span class="chip divider">‖</span>
        <span class="chip miss">MISS</span><span class="chip">19</span><span class="chip">T20</span>
      </div>
    </footer>
  </div>

</div>
</body>
</html>
