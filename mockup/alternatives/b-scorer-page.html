<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Barrelo — Alt B: Scorer view</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="alt.css">
</head>
<body class="alt-body">
<div class="scene is-ready" style="min-height:auto;">

  <div class="concept-nav">
    <a class="crumb" href="index.html">&lsaquo; All alternatives</a>
    <span class="game-pill">Alt B — Scorer device</span>
    <a class="cross-link" href="b-spectator-page.html">Open spectator view →</a>
  </div>

  <p class="state-frame-note">This screen lives on the scorer's tablet, next to the board. No game view here at all — it hands off to a second device for that.</p>

  <div class="scorer-shell">
    <header class="rail" style="margin-bottom:0; border-bottom:none;">
      <div class="rail-left">
        <div class="wordmark">Barrelo<small>scorer</small></div>
      </div>
      <div class="meta">
        <span class="legmeta">Leg 2 · Set 1</span>
        <span class="source-pill manual"><span class="dot"></span>Manual entry</span>
      </div>
    </header>

    <div class="table">
      <section class="scorecard active" data-player="0">
        <div class="hook"></div>
        <div class="player-row">
          <h2 class="player-name">Febre</h2>
          <span class="oche-badge">on the oche</span>
        </div>
        <div class="visit">
          <span class="visit-label">This visit</span>
          <div class="dart-slots">
            <div class="dart-slot filled">T20</div>
            <div class="dart-slot"></div>
            <div class="dart-slot"></div>
          </div>
        </div>
      </section>

      <div class="board-stage">
        <div class="board-wrap">
          <svg id="scorerBoard" role="group" aria-label="Interactive dartboard"></svg>
        </div>
        <div class="controls">
          <button class="pull-btn warn">Miss</button>
          <button class="pull-btn">Undo last dart</button>
          <button class="pull-btn go">End turn</button>
        </div>
      </div>

      <section class="scorecard" data-player="1">
        <div class="hook"></div>
        <div class="player-row">
          <h2 class="player-name">Sam</h2>
        </div>
        <div class="visit">
          <span class="visit-label">This visit</span>
          <div class="dart-slots">
            <div class="dart-slot"></div>
            <div class="dart-slot"></div>
            <div class="dart-slot"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

</div>
<script src="../dartboard.js"></script>
<script>createDartboard(document.getElementById('scorerBoard'));</script>
</body>
</html>
